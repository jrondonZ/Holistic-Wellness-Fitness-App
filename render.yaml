# Render.com blueprint for the Holistic Chart app.
# Deploy by connecting this repo as a Blueprint in the Render dashboard.
services:
  - type: web
    name: holistic-chart
    runtime: ruby
    plan: free
    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails db:migrate
      bundle exec rails db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: holistic-chart-db
          property: connectionString

databases:
  - name: holistic-chart-db
    plan: free
    databaseName: holistic_chart_production
